name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Audit
        run: bun audit --json

      - name: Test
        run: bun test

      - name: Smoke
        run: bun run smoke
